[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "vera-anchor"
version = "0.1.4"
description = "Local Python SDK for Vera Anchor"
readme = "README.md"
requires-python = ">=3.8"
license = "LicenseRef-VeraAnchor-MIT-Commons-Clause"
license-files = ["LICENSE"]

authors = [
    { name = "Andrew McClure", email = "andrew@veraanchor.com" }
]

keywords = [
    "vera",
    "anchor",
    "sdk",
    "hashing",
    "ingest",
    "evidence",
    "hedera",
]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Security",
    "Topic :: Scientific/Engineering :: Information Analysis",
]

dependencies = [
    "httpx>=0.27,<1.0",
]

[project.optional-dependencies]
dev = [
    "build>=1.2",
    "mypy>=1.8",
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.6",
]

[project.urls]
Homepage = "https://veraanchor.com"
Repository = "https://github.com/veraanchor/vera-anchor-py"
Issues = "https://github.com/veraanchor/vera-anchor-py/issues"
Changelog = "https://github.com/veraanchor/vera-anchor-py/blob/main/CHANGELOG.md"
Documentation = "https://github.com/veraanchor/vera-anchor-py/blob/main/README.md"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["vera_anchor*"]

[tool.ruff]
line-length = 88
target-version = "py38"

[tool.mypy]
python_version = "3.8"
strict = false
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]